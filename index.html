<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3 Choropleth Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; display: flex; height: 100vh; }
#sidebar {
  width: 300px; min-width: 300px; background: #fff; padding: 16px;
  border-right: 1px solid #ddd; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
#sidebar h2 { font-size: 16px; margin-bottom: 2px; }
#sidebar label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; color: #555; }
#sidebar select, #sidebar input[type="text"], #sidebar input[type="number"] {
  width: 100%; padding: 5px 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
}
#sidebar input[type="range"] { width: 100%; }
#drop-zone {
  border: 2px dashed #aaa; border-radius: 8px; padding: 20px 12px; text-align: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 13px; color: #666;
}
#drop-zone.dragover { border-color: #2563eb; background: #eff6ff; }
#drop-zone input { display: none; }
.file-loaded-panel {
  display: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px; background: #fafafa;
}
.file-loaded-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.file-loaded-name { font-size: 12px; font-weight: 600; color: #444; overflow-wrap: anywhere; }
.file-loaded-actions { display: flex; gap: 6px; }
.file-loaded-actions button {
  border: 1px solid #ccc; border-radius: 4px; padding: 4px 7px; font-size: 11px; background: #fff; cursor: pointer;
}
.file-loaded-actions button:hover { background: #f0f0f0; }
.file-loaded-actions .danger { border-color: #ef9a9a; color: #b71c1c; }
.file-preview-status { margin-top: 6px; font-size: 11px; color: #777; }
.file-comments-wrap {
  margin-top: 6px; max-height: 90px; overflow: auto; border: 1px solid #e3e3e3; border-radius: 4px;
  background: #fff; padding: 6px; font-size: 11px; color: #555; line-height: 1.35;
}
.file-comments-title { font-weight: 600; color: #666; margin-bottom: 4px; }
.file-comments-line { white-space: nowrap; }
.file-preview-wrap {
  margin-top: 6px; max-height: 180px; overflow: auto; border: 1px solid #e3e3e3; border-radius: 4px; background: #fff;
}
.file-preview-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.file-preview-table th, .file-preview-table td {
  border-bottom: 1px solid #eee; padding: 4px 6px; text-align: left; white-space: nowrap;
}
.file-preview-table th { position: sticky; top: 0; background: #f7f7f7; color: #555; font-weight: 600; }
#map-container {
  flex: 1; overflow: auto; padding: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#map-svg-wrap { position: relative; width: 100%; }
#map-svg-wrap svg { width: 100%; height: auto; display: block; }
.country { stroke: #fff; stroke-width: 0.4; transition: fill 0.15s; cursor: pointer; }
.country:hover { stroke: #444; stroke-width: 1.2; }
#tooltip {
  position: absolute; pointer-events: none; background: rgba(0,0,0,0.85); color: #fff;
  padding: 6px 10px; border-radius: 4px; font-size: 12px; display: none; white-space: nowrap;
  z-index: 10;
}
.control-group { display: flex; flex-direction: column; }
.row-group { display: flex; gap: 8px; }
.row-group .control-group { flex: 1; }
.toggle-group { display: flex; gap: 0; }
.toggle-group button {
  flex: 1; padding: 5px; font-size: 12px; border: 1px solid #ccc; background: #fff; cursor: pointer;
}
.toggle-group button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.toggle-group button:first-child { border-radius: 4px 0 0 4px; }
.toggle-group button:last-child { border-radius: 0 4px 4px 0; }
#export-btns button {
  width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px;
  background: #fff; cursor: pointer; font-weight: 500;
}
#export-btns { gap: 10px; }
#export-btns button:hover { background: #f0f0f0; }
#unmatched-panel {
  display: none; max-height: 180px; overflow-y: auto; background: #fff8e1;
  border: 1px solid #ffe082; border-radius: 4px; padding: 8px; font-size: 12px;
}
#unmatched-panel h3 { font-size: 12px; color: #e65100; margin-bottom: 4px; }
.unmatched-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 3px; }
.unmatched-row span { flex: 1; font-size: 11px; }
.unmatched-row input { width: 55px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 11px; }
.section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
.range-row { display: flex; align-items: center; gap: 6px; }
.range-row input[type="range"] { flex: 1; }
.range-val { font-size: 11px; color: #888; min-width: 28px; text-align: right; }
.helper-text { font-size: 11px; color: #777; line-height: 1.35; margin-top: 6px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Choropleth Map</h2>

  <div class="control-group">
    <div id="drop-zone">
      <p>Drop a CSV here or click to select</p>
      <input type="file" id="file-input" accept=".csv,.tsv,.txt">
    </div>
    <p id="upload-helper" class="helper-text">In GA, open <strong>Demographic details: Country</strong>, then use <strong>Share this report -> Download file -> CSV</strong>.</p>
    <div id="file-loaded-panel" class="file-loaded-panel">
      <div class="file-loaded-header">
        <div id="loaded-file-name" class="file-loaded-name"></div>
        <div class="file-loaded-actions">
          <button type="button" id="change-file-btn" class="danger">Use different file</button>
        </div>
      </div>
      <div id="file-preview-status" class="file-preview-status"></div>
      <div id="file-comments-wrap" class="file-comments-wrap">
        <div class="file-comments-title">Comments</div>
        <div id="file-comments"></div>
      </div>
      <div class="file-preview-wrap">
        <table id="file-preview-table" class="file-preview-table"></table>
      </div>
    </div>
  </div>

  <div class="control-group">
    <label for="metric-select">Metric</label>
    <select id="metric-select" disabled><option>Load a CSV first</option></select>
  </div>

  <div class="control-group">
    <label for="title-input">Title</label>
    <input type="text" id="title-input" value="Users by Country">
  </div>

  <div class="control-group">
    <label>Title font size</label>
    <div class="range-row">
      <input type="range" id="title-fontsize" min="12" max="32" value="17">
      <span class="range-val" id="title-fontsize-val">17</span>
    </div>
  </div>

  <div class="control-group">
    <label for="legend-label-input">Legend label</label>
    <input type="text" id="legend-label-input" value="">
  </div>

  <div class="row-group">
    <div class="control-group">
      <label for="color-select">Color Scheme</label>
      <select id="color-select">
        <option value="teal" selected>Teal</option>
        <option value="interpolateBlues">Blues</option>
        <option value="interpolateGreens">Greens</option>
        <option value="interpolateGnBu">GnBu</option>
        <option value="interpolateYlGnBu">YlGnBu</option>
        <option value="interpolateOranges">Oranges</option>
        <option value="interpolateReds">Reds</option>
        <option value="interpolateYlOrRd">YlOrRd</option>
        <option value="interpolateViridis">Viridis</option>
        <option value="interpolatePlasma">Plasma</option>
        <option value="interpolateCividis">Cividis</option>
      </select>
    </div>
    <div class="control-group">
      <label for="projection-select">Projection</label>
      <select id="projection-select">
        <option value="geoNaturalEarth1" selected>Natural Earth</option>
        <option value="geoMercator">Mercator</option>
        <option value="geoEqualEarth">Equal Earth</option>
        <option value="geoEquirectangular">Equirectangular</option>
        <option value="geoOrthographic">Orthographic</option>
      </select>
    </div>
  </div>

  <div class="control-group">
    <label>Scale</label>
    <div class="toggle-group">
      <button id="btn-log" class="active">Logarithmic</button>
      <button id="btn-linear">Linear</button>
    </div>
  </div>

  <div class="section-label">Legend</div>
  <div class="control-group">
    <label>Width</label>
    <div class="range-row">
      <input type="range" id="legend-width" min="100" max="600" value="300">
      <span class="range-val" id="legend-width-val">300</span>
    </div>
  </div>
  <div class="control-group">
    <label>Font size</label>
    <div class="range-row">
      <input type="range" id="legend-fontsize" min="8" max="18" value="11">
      <span class="range-val" id="legend-fontsize-val">11</span>
    </div>
  </div>

  <div id="unmatched-panel">
    <h3>Unmatched countries</h3>
    <div id="unmatched-list"></div>
  </div>

  <div class="control-group" id="export-btns">
    <button id="export-png">Export PNG</button>
    <button id="share-link">Copy share URL</button>
  </div>
</div>

<div id="map-container">
  <div id="map-svg-wrap">
    <div id="tooltip"></div>
  </div>
</div>

// custom teal interpolator for map fill
function interpolateTeal(t) {
  // from light gray-green (#cbdad7) to deep teal (#0a516d)
  const r = Math.round(203 + t * (10 - 203));
  const g = Math.round(218 + t * (81 - 218));
  const b = Math.round(215 + t * (109 - 215));
  return `rgb(${r},${g},${b})`;
}

function getInterpolator() {
  const v = colorSelect.value;
  if (v === "teal") return interpolateTeal;
  return d3[v] || d3.interpolateBlues;
}

// --- number formatting: 1K, 2.5M, etc ---
function fmtNum(v) {
  if (v >= 1e6) return (v / 1e6).toFixed(v >= 1e7 ? 0 : 1).replace(/\.0$/, "") + "M";
  if (v >= 1e3) return (v / 1e3).toFixed(v >= 1e4 ? 0 : 1).replace(/\.0$/, "") + "k";
  return String(Math.round(v));
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function setUploadUI(hasFile) {
  dropZone.style.display = hasFile ? "none" : "block";
  uploadHelper.style.display = hasFile ? "none" : "block";
  fileLoadedPanel.style.display = hasFile ? "block" : "none";
}

function renderFilePreview(filename, headers, rows, comments) {
  const cols = (headers || []).filter(Boolean);
  const previewRows = rows;
  const previewComments = (comments || []).slice(0, 20);
  loadedFileName.textContent = filename;
  filePreviewStatus.textContent = `${rows.length.toLocaleString()} rows loaded`;
  if (previewComments.length) {
    fileCommentsWrap.style.display = "block";
    fileComments.innerHTML = previewComments
      .map(line => `<div class="file-comments-line">${escapeHtml(line)}</div>`)
      .join("");
  } else {
    fileCommentsWrap.style.display = "none";
    fileComments.innerHTML = "";
  }
  if (!cols.length) {
    filePreviewTable.innerHTML = "";
    return;
  }
  const headHtml = `<thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr></thead>`;
  const bodyHtml = `<tbody>${previewRows.map(row => {
    const cells = cols.map(col => {
      const raw = row[col];
      const val = raw == null ? "" : (typeof raw === "number" ? raw.toLocaleString() : String(raw));
      return `<td>${escapeHtml(val)}</td>`;
    }).join("");
    return `<tr>${cells}</tr>`;
  }).join("")}</tbody>`;
  filePreviewTable.innerHTML = headHtml + bodyHtml;
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result, file.name);
  reader.readAsText(file);
}

function parseCSV(text, filename) {
  const lines = text.split("\n");
  const commentLines = lines
    .filter(l => l.trim().startsWith("#"))
    .map(l => l.trim().replace(/^#\s?/, ""))
    .filter(Boolean);
  const dataLines = lines.filter(l => !l.trim().startsWith("#"));
  const cleaned = dataLines.join("\n");

  const result = Papa.parse(cleaned, { header: true, dynamicTyping: true, skipEmptyLines: true });
  parsedRows = result.data;
  if (!parsedRows.length) return;
  loadedFileText = text;
  loadedFilename = filename;

  const headers = result.meta.fields;
  numericColumns = headers.filter(h => parsedRows.some(r => typeof r[h] === "number" && isFinite(r[h])));

  // populate metric selector, default to "Active users" if available
  metricSelect.innerHTML = "";
  metricSelect.disabled = false;
  const preferredMetric = numericColumns.find(c => c.toLowerCase() === "active users");
  numericColumns.forEach(col => {
    const opt = document.createElement("option");
    opt.value = col;
    opt.textContent = col;
    opt.selected = (preferredMetric ? col === preferredMetric : col === numericColumns[0]);
    metricSelect.appendChild(opt);
  });

  const baseName = filename.replace(/\.[^.]+$/, "");
  titleInput.value = baseName;
  legendLabelInput.value = metricSelect.value;
  renderFilePreview(filename, headers, parsedRows, commentLines);
  setUploadUI(true);

  processData();
}

function parseOptionValue(selectEl, value) {
  if (value == null) return;
  if ([...selectEl.options].some(opt => opt.value === value)) selectEl.value = value;
}

function parseRangeValue(inputEl, value, fallback) {
  if (value == null) return fallback;
  const n = Number(value);
  if (!isFinite(n)) return fallback;
  return Math.min(Number(inputEl.max), Math.max(Number(inputEl.min), n));
}

function encodeBase64Url(text) {
  const bytes = new TextEncoder().encode(text);
  let binary = "";
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function decodeBase64Url(encoded) {
  const padded = encoded.replace(/-/g, "+").replace(/_/g, "/") + "=".repeat((4 - encoded.length % 4) % 4);
  const binary = atob(padded);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function applyStateFromHash() {
  const rawHash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
  if (!rawHash) return;
  const params = new URLSearchParams(rawHash);
  let csvText = params.get("csv");
  const csvB64 = params.get("csvb64");
  if (!csvText && csvB64) {
    try {
      csvText = decodeBase64Url(csvB64);
    } catch (err) {
      return;
    }
  }
  if (!csvText) return;

  const filename = params.get("filename") || "shared-map.csv";
  parseCSV(csvText, filename);
  if (!parsedRows.length) return;

  const metric = params.get("metric");
  if (metric && numericColumns.includes(metric)) metricSelect.value = metric;
  if (params.has("title")) titleInput.value = params.get("title");
  if (params.has("legendLabel")) legendLabelInput.value = params.get("legendLabel");

  parseOptionValue(colorSelect, params.get("color"));
  parseOptionValue(projectionSelect, params.get("projection"));

  const titleFont = parseRangeValue(titleFontsizeInput, params.get("titleFont"), +titleFontsizeInput.value);
  titleFontsizeInput.value = String(titleFont);
  document.getElementById("title-fontsize-val").textContent = String(titleFont);

  const legendWidth = parseRangeValue(legendWidthInput, params.get("legendWidth"), +legendWidthInput.value);
  legendWidthInput.value = String(legendWidth);
  document.getElementById("legend-width-val").textContent = String(legendWidth);

  const legendFont = parseRangeValue(legendFontsizeInput, params.get("legendFont"), +legendFontsizeInput.value);
  legendFontsizeInput.value = String(legendFont);
  document.getElementById("legend-fontsize-val").textContent = String(legendFont);

  const scale = params.get("scale");
  if (scale === "linear") {
    scaleType = "linear";
    btnLinear.classList.add("active");
    btnLog.classList.remove("active");
  } else {
    scaleType = "log";
    btnLog.classList.add("active");
    btnLinear.classList.remove("active");
  }

  processData();
  window.history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
}

function buildShareUrl() {
  if (!loadedFileText) return null;
  const hashParams = new URLSearchParams();
  hashParams.set("filename", loadedFilename || "shared-map.csv");
  hashParams.set("csvb64", encodeBase64Url(loadedFileText));
  hashParams.set("metric", metricSelect.value || "");
  hashParams.set("title", titleInput.value || "");
  hashParams.set("legendLabel", legendLabelInput.value || "");
  hashParams.set("color", colorSelect.value || "");
  hashParams.set("projection", projectionSelect.value || "");
  hashParams.set("scale", scaleType);
  hashParams.set("titleFont", titleFontsizeInput.value);
  hashParams.set("legendWidth", legendWidthInput.value);
  hashParams.set("legendFont", legendFontsizeInput.value);

  const url = new URL(window.location.href);
  url.hash = hashParams.toString();
  return url.toString();
}

async function copyShareLink() {
  const url = buildShareUrl();
  if (!url) {
    window.alert("Load a CSV first to create a share link.");
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    window.alert("Share link copied.");
  } catch (err) {
    window.prompt("Copy share link:", url);
  }
}

function processData() {
  const metric = metricSelect.value;
  if (!metric) return;

  const countryCol = Object.keys(parsedRows[0])[0];
  dataByA3 = {};
  unmatchedCountries = [];

  for (const row of parsedRows) {
    const name = row[countryCol];
    const val = row[metric];
    if (!name || typeof name !== "string") continue;
    if (IGNORED_NAMES.has(name.trim())) continue;
    if (typeof val !== "number" || !isFinite(val) || val <= 0) continue;

    const a3 = countryNameToA3(name);
    if (a3) {
      dataByA3[a3] = (dataByA3[a3] || 0) + val;
    } else {
      unmatchedCountries.push({ name, value: val });
    }
  }

  showUnmatched();
  renderMap();
}

function showUnmatched() {
  if (!unmatchedCountries.length) {
    unmatchedPanel.style.display = "none";
    return;
  }
  unmatchedPanel.style.display = "block";
  unmatchedList.innerHTML = "";
  unmatchedCountries.forEach((entry, i) => {
    const row = document.createElement("div");
    row.className = "unmatched-row";
    row.innerHTML = `<span>${entry.name} (${entry.value})</span><input type="text" placeholder="ISO" data-idx="${i}">`;
    unmatchedList.appendChild(row);
  });
  unmatchedList.addEventListener("change", e => {
    if (e.target.tagName === "INPUT") {
      const idx = parseInt(e.target.dataset.idx);
      const code = e.target.value.trim().toUpperCase();
      if (code.length === 3 && unmatchedCountries[idx]) {
        dataByA3[code] = (dataByA3[code] || 0) + unmatchedCountries[idx].value;
        renderMap();
      }
    }
  });
}

function createProjection(w) {
  const projName = projectionSelect.value;
  const proj = d3[projName]();
  const featureCollection = { type: "FeatureCollection", features: countries };
  proj.fitWidth(w, featureCollection);
  return proj;
}

function rebuildMap() {
  // full teardown and rebuild (for projection changes)
  if (svg) svg.remove();
  svg = null;
  mapGroup = null;
  initMap();
}

function initMap() {
  const rect = svgWrap.getBoundingClientRect();
  const w = Math.max(320, Math.floor(rect.width));
  const titleFontSize = +titleFontsizeInput.value;
  const legendFontSize = +legendFontsizeInput.value;
  const legendLabel = legendLabelInput.value.trim();
  const topPad = 10;
  const titleGapToMap = 38;
  const legendGapFromMap = 12;
  const bottomPad = 14;
  const legendBarH = Math.max(10, legendFontSize + 1);
  const legendAxisH = legendFontSize + 8;
  const legendLabelH = legendLabel ? legendFontSize + 8 : 0;

  // filter out antarctica
  const allFeatures = topojson.feature(worldTopo, worldTopo.objects.countries).features;
  countries = allFeatures.filter(f => f.id !== ANTARCTICA_ID);

  projection = createProjection(w);
  path = d3.geoPath(projection);
  const featureCollection = { type: "FeatureCollection", features: countries };
  const projectedBounds = path.bounds(featureCollection);
  const mapX0 = projectedBounds[0][0];
  const mapY0 = projectedBounds[0][1];
  const mapY1 = projectedBounds[1][1];
  const NATURAL_EARTH_X_SHIFT = -50; // tweak this to fine-tune left/right balance
  let mapOffsetX = 0;
  if (projectionSelect.value === "geoNaturalEarth1") {
    mapOffsetX = NATURAL_EARTH_X_SHIFT;
  }
  const mapOffsetY = topPad + titleFontSize + titleGapToMap - mapY0;

  mapVisualTop = mapY0 + mapOffsetY;
  mapVisualBottom = mapY1 + mapOffsetY;
  const h = Math.ceil(
    mapVisualBottom + legendGapFromMap + legendLabelH + legendBarH + legendAxisH + bottomPad
  );

  svg = d3.select(svgWrap).append("svg")
    .attr("id", "map-svg")
    .attr("viewBox", `0 0 ${w} ${h}`)
    .attr("preserveAspectRatio", "xMidYMid meet");

  // white background
  svg.append("rect").attr("width", w).attr("height", h).attr("fill", "#fff");

  // title (anchored close to actual map top)
  svg.append("text")
    .attr("id", "svg-title")
    .attr("x", w / 2).attr("y", Math.max(titleFontSize + 4, mapVisualTop - 38))
    .attr("text-anchor", "middle")
    .attr("font-family", "system-ui, sans-serif")
    .attr("font-size", titleFontSize).attr("font-weight", 600).attr("fill", "#222")
    .text(titleInput.value);

  // map group
  mapGroup = svg.append("g").attr("id", "map-group");

  // offset map group to center geometry and leave title space above map
  mapGroup.append("g").attr("id", "map-inner").attr("transform", `translate(${mapOffsetX}, ${mapOffsetY})`);

  drawCountries();
}

function getColorScale() {
  const values = Object.values(dataByA3);
  if (!values.length) return () => "#e0e0e0";
  const extent = d3.extent(values);
  const interpolator = getInterpolator();

  if (scaleType === "log") {
    const logMin = Math.max(1, extent[0]);
    let logMax = Math.pow(10, Math.ceil(Math.log10(Math.max(logMin, extent[1]))));
    if (logMax <= logMin) logMax = logMin * 10;
    return d3.scaleSequentialLog(interpolator).domain([logMin, logMax]);
  } else {
    return d3.scaleSequential(interpolator).domain(extent);
  }
}

function drawCountries() {
  const colorScale = getColorScale();
  const innerG = svg.select("#map-inner");

  innerG.selectAll("path.country").remove();
  innerG.selectAll("path.country")
    .data(countries)
    .join("path")
    .attr("class", "country")
    .attr("d", path)
    .attr("fill", d => {
      const a3 = NUM_TO_A3[d.id];
      const val = a3 ? dataByA3[a3] : undefined;
      return val != null ? colorScale(val) : "#eaeaea";
    })
    .on("mousemove", (e, d) => {
      const a3 = NUM_TO_A3[d.id];
      const val = a3 ? dataByA3[a3] : undefined;
      const name = d.properties.name || a3 || "Unknown";
      tooltip.style.display = "block";
      tooltip.style.left = (e.clientX - svgWrap.getBoundingClientRect().left + 12) + "px";
      tooltip.style.top = (e.clientY - svgWrap.getBoundingClientRect().top - 20) + "px";
      tooltip.textContent = val != null ? `${name}: ${val.toLocaleString()}` : `${name}: no data`;
    })
    .on("mouseleave", () => { tooltip.style.display = "none"; });

  drawLegend(colorScale);
}

function renderMap() {
  if (!worldTopo) return;
  if (!svg) initMap();
  else drawCountries();
}

// --- legend (continuous gradient inside SVG) ---
function drawLegend(colorScale) {
  svg.selectAll(".legend-group").remove();
  svg.selectAll(".legend-defs").remove();
  const values = Object.values(dataByA3);
  if (!values.length) return;

  const vb = svg.attr("viewBox").split(" ").map(Number);
  const svgW = vb[2], svgH = vb[3];
  const totalW = +legendWidthInput.value;
  const fontSize = +legendFontsizeInput.value;
  const barH = Math.max(10, fontSize + 1);
  const domain = colorScale.domain();
  const minVal = domain[0];
  const maxVal = domain[1];

  const lg = svg.append("g").attr("class", "legend-group");
  const defs = svg.append("defs").attr("class", "legend-defs");
  const gradient = defs.append("linearGradient")
    .attr("id", "legend-gradient")
    .attr("x1", "0%").attr("x2", "100%")
    .attr("y1", "0%").attr("y2", "0%");

  for (let i = 0; i <= 100; i++) {
    const t = i / 100;
    const val = (scaleType === "log")
      ? minVal * Math.pow(maxVal / minVal, t)
      : minVal + (maxVal - minVal) * t;
    gradient.append("stop")
      .attr("offset", `${i}%`)
      .attr("stop-color", colorScale(val));
  }

  const legendX = (svgW - totalW) / 2;
  const legendLabel = legendLabelInput.value.trim();
  const labelGap = legendLabel ? fontSize + 8 : 0;
  const legendY = Math.min(
    svgH - barH - fontSize - 14,
    mapVisualBottom + 12 + labelGap
  );

  if (legendLabel) {
    lg.append("text")
      .attr("x", svgW / 2).attr("y", legendY - 6)
      .attr("text-anchor", "middle")
      .attr("font-family", "system-ui, sans-serif")
      .attr("font-size", fontSize)
      .attr("fill", "#666")
      .text(legendLabel);
  }

  lg.append("rect")
    .attr("x", legendX).attr("y", legendY)
    .attr("width", totalW).attr("height", barH)
    .attr("fill", "url(#legend-gradient)");

  const legendScale = (scaleType === "log")
    ? d3.scaleLog().domain([minVal, maxVal]).range([legendX, legendX + totalW])
    : d3.scaleLinear().domain([minVal, maxVal]).range([legendX, legendX + totalW]);
  let tickValues;
  if (scaleType === "log") {
    const startPow = Math.floor(Math.log10(Math.max(1, minVal)));
    const endPow = Math.ceil(Math.log10(maxVal));
    tickValues = [];
    for (let p = startPow; p <= endPow; p++) tickValues.push(Math.pow(10, p));
  } else {
    tickValues = legendScale.ticks(5).filter(v => v >= minVal && v <= maxVal);
  }
  if (!tickValues.length) tickValues = [minVal, maxVal];

  const axis = d3.axisBottom(legendScale)
    .tickValues(tickValues)
    .tickFormat(d => fmtNum(d))
    .tickSizeOuter(0);

  const axisG = lg.append("g")
    .attr("transform", `translate(0, ${legendY + barH})`)
    .call(axis);
  axisG.selectAll("text")
    .attr("font-family", "system-ui, sans-serif")
    .attr("font-size", fontSize)
    .attr("fill", "#555");
  axisG.selectAll("line").attr("stroke", "#666");
  axisG.select("path").attr("stroke", "#666");
}

// --- controls ---
metricSelect.addEventListener("change", () => {
  legendLabelInput.value = metricSelect.value;
  processData();
});
titleInput.addEventListener("input", () => {
  if (svg) svg.select("#svg-title").text(titleInput.value);
});
titleFontsizeInput.addEventListener("input", () => {
  document.getElementById("title-fontsize-val").textContent = titleFontsizeInput.value;
  if (worldTopo) rebuildMap();
});
legendLabelInput.addEventListener("input", () => { if (worldTopo) rebuildMap(); });
colorSelect.addEventListener("change", () => { if (svg) drawCountries(); });
projectionSelect.addEventListener("change", rebuildMap);
btnLog.addEventListener("click", () => { scaleType = "log"; btnLog.classList.add("active"); btnLinear.classList.remove("active"); if (svg) drawCountries(); });
btnLinear.addEventListener("click", () => { scaleType = "linear"; btnLinear.classList.add("active"); btnLog.classList.remove("active"); if (svg) drawCountries(); });

// legend controls
function updateLegendDisplay() {
  document.getElementById("legend-width-val").textContent = legendWidthInput.value;
  document.getElementById("legend-fontsize-val").textContent = legendFontsizeInput.value;
  if (worldTopo) rebuildMap();
}
legendWidthInput.addEventListener("input", updateLegendDisplay);
legendFontsizeInput.addEventListener("input", updateLegendDisplay);
shareLinkBtn.addEventListener("click", copyShareLink);

window.addEventListener("resize", () => {
  if (!worldTopo) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => rebuildMap(), 120);
});

// --- export PNG (high quality) ---
document.getElementById("export-png").addEventListener("click", () => {
  const svgEl = document.getElementById("map-svg");
  if (!svgEl) return;
  const vb = svgEl.getAttribute("viewBox").split(" ").map(Number);
  const vbW = vb[2], vbH = vb[3];
  const scale = 4;
  const canvas = document.createElement("canvas");
  canvas.width = vbW * scale;
  canvas.height = vbH * scale;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);
  const serialized = new XMLSerializer().serializeToString(svgEl);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, vbW, vbH);
    canvas.toBlob(blob => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "map.png";
      a.click();
      URL.revokeObjectURL(a.href);
    }, "image/png");
  };
  img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(serialized)));
});

// --- init ---
applyStateFromHash();
loadWorld().then(() => initMap());
</script>
